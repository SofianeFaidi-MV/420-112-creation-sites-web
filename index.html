<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>420-112 – Création de sites web</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: #1a2345;
      --text: #eef2ff;
      --muted: #b7c0e0;
      --accent: #61dafb;
      --accent-2: #7c9cff;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
      --radius: 18px;
      --maxw: 1220px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #09101f 0%, #0e1730 100%);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      padding: 28px 20px;
      background: rgba(10, 15, 32, 0.92);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .brand {
      padding: 18px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(124,156,255,0.22), rgba(97,218,251,0.14));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .brand h1 {
      font-size: 1.42rem;
      line-height: 1.2;
      margin: 0 0 10px;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .nav-title {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 22px 0 10px;
    }

    .nav-links {
      display: grid;
      gap: 10px;
    }

    .nav-links a {
      display: block;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid transparent;
      border-radius: 14px;
      color: var(--text);
      transition: 0.2s ease;
    }

    .nav-links a:hover {
      background: rgba(124,156,255,0.13);
      border-color: var(--border);
      text-decoration: none;
      transform: translateX(2px);
    }

    .content { padding: 34px; }
    .container { max-width: var(--maxw); margin: 0 auto; }

    .hero {
      padding: 34px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(124,156,255,0.18), rgba(97,218,251,0.10));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .hero .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(97,218,251,0.12);
      border: 1px solid rgba(97,218,251,0.28);
      color: var(--accent);
      font-size: 0.88rem;
      margin-bottom: 16px;
    }

    .hero h2 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      margin: 0 0 14px;
      line-height: 1.1;
    }

    .hero p {
      color: var(--muted);
      max-width: 800px;
      margin: 0 0 24px;
      font-size: 1.03rem;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 14px;
      background: var(--accent-2);
      color: white;
      font-weight: 700;
      border: none;
      box-shadow: var(--shadow);
    }

    .btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: none;
    }

    .grid { display: grid; gap: 20px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .card h3, .card h4 { margin-top: 0; margin-bottom: 10px; }
    .card p, .card li { color: var(--muted); }

    .section { margin: 34px 0; }
    .section h2 { font-size: 1.8rem; margin-bottom: 14px; }
    .section-intro { color: var(--muted); margin-bottom: 18px; }

    .module-tag, .week-tag {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--accent);
      background: rgba(97,218,251,0.10);
      border: 1px solid rgba(97,218,251,0.24);
      padding: 5px 10px;
      border-radius: 999px;
      width: fit-content;
      margin-bottom: 10px;
    }

    .resource-list, .simple-list {
      margin: 0;
      padding-left: 18px;
    }

    .download-list {
      display: grid;
      gap: 12px;
    }

    .download-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
    }

    .download-item span {
      color: var(--text);
      font-weight: 600;
    }

    code.inline {
      background: rgba(255,255,255,0.08);
      padding: 2px 8px;
      border-radius: 8px;
      color: #d7e2ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .footer {
      margin-top: 38px;
      padding: 18px 4px 10px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      font-size: 0.95rem;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .content { padding: 20px; }
      .hero { padding: 24px; }
      .download-item {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <h1>420-112<br>Création de sites web</h1>
        <p>Site du cours • Cégep Marie-Victorin</p>
      </div>

      <div class="nav-title">Navigation</div>
      <nav class="nav-links">

        <a href="#contenu">Contenu du cours</a>

        <a href="#javascript">Bloc JavaScript</a>
        <a href="#telechargements">Téléchargements</a>
        <a href="#organisation">Organisation des fichiers</a>
